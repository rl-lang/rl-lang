name: Open Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.4.0)"
        required: true
        type: string
      bump:
        description: "Bump type"
        required: true
        type: choice
        options: [patch, minor, major]
      notes:
        description: "Extra release notes (optional, prepended above the commit list)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build commit log
        id: log
        run: |
          {
            echo "changelog<<EOF"
            git log origin/main..origin/dev --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number=$(gh pr list --base main --head dev --json number --jq '.[0].number // empty')
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(cat <<BODY
          ## ${{ inputs.version }} (${{ inputs.bump }})

          ${{ inputs.notes }}

          ### Commits
          ${{ steps.log.outputs.changelog }}
          BODY
          )

          if [ -n "${{ steps.existing.outputs.number }}" ]; then
            gh pr edit "${{ steps.existing.outputs.number }}" \
              --title "release ${{ inputs.version }}" \
              --body "$body"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "release ${{ inputs.version }}" \
              --body "$body"
          fi
