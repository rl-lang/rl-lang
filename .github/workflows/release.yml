name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name_default: rl
            name_debug: rl_debug

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name_default: rl.exe
            name_debug: rl_debug.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build default
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy default binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/rl ${{ matrix.name_default }}

      - name: Copy default binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\rl.exe ${{ matrix.name_default }}
        shell: cmd

      - name: Build debug feature
        run: cargo build --release --features debug --target ${{ matrix.target }}

      - name: Copy debug binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/rl ${{ matrix.name_debug }}

      - name: Copy debug binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\rl.exe ${{ matrix.name_debug }}
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.name_default }}
            ${{ matrix.name_debug }}

  publish:
    name: Publish Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          # Auto-flags the GitHub release as a pre-release when the tag
          # has a SemVer pre-release part (e.g. v0.3.0-rc.1, v0.2.0-beta.2)
          prerelease: auto

  announce:
    name: Announce on Discord
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to find the previous tag

      - name: Classify release
        id: classify
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          CORE="${VERSION%%-*}"

          # split off a pre-release identifier if one exists (alpha/beta/rc/dev/...)
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"
            PRE_KIND=$(echo "$PRE" | cut -d. -f1 | tr '[:upper:]' '[:lower:]')
          else
            PRE=""
            PRE_KIND=""
          fi

          case "$PRE_KIND" in
            alpha)       LABEL="­¤¦¬ Alpha pre-release"; COLOR=15105570 ;;
            beta)        LABEL="­¤¦¼ Beta pre-release";  COLOR=15844367 ;;
            rc)          LABEL="­¤Ü” Release candidate"; COLOR=3447003 ;;
            dev|nightly) LABEL="­¤īÖ Dev build";          COLOR=9807270 ;;
            "")          LABEL=""; COLOR=3066993 ;; # stable ŌĆö label set below once bump type is known
            *)           LABEL="­¤ö¢ Pre-release ($PRE_KIND)"; COLOR=10181046 ;;
          esac

          # find the previous tag (excluding this one) to compute the bump type
          PREV_TAG=$(git for-each-ref refs/tags --sort=-v:refname --format='%(refname:short)' \
            | grep -v "^${TAG}$" | head -n 1 || true)

          BUMP=""
          if [[ -n "$PREV_TAG" && "$PREV_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            PREV_CORE="${PREV_TAG#v}"; PREV_CORE="${PREV_CORE%%-*}"
            IFS='.' read -r CMAJ CMIN CPAT <<< "$CORE"
            IFS='.' read -r PMAJ PMIN PPAT <<< "$PREV_CORE"
            if   [[ "$CMAJ" != "$PMAJ" ]]; then BUMP="major"
            elif [[ "$CMIN" != "$PMIN" ]]; then BUMP="minor"
            elif [[ "$CPAT" != "$PPAT" ]]; then BUMP="patch"
            else BUMP="same"
            fi
          fi

          if [[ -z "$PRE_KIND" ]]; then
            case "$BUMP" in
              major) LABEL="­¤Äē Major release" ;;
              minor) LABEL="Ō£© Minor release" ;;
              patch) LABEL="­¤Éø Patch release" ;;
              *)     LABEL="Ō£ģ Stable release" ;;
            esac
            COLOR=3066993
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "label=$LABEL"
            echo "color=$COLOR"
            echo "bump=$BUMP"
            echo "prev_tag=$PREV_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK }}
        run: |
          TAG="${{ steps.classify.outputs.tag }}"
          LABEL="${{ steps.classify.outputs.label }}"
          COLOR="${{ steps.classify.outputs.color }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$LABEL ŌĆö $TAG",
              "url": "$RELEASE_URL",
              "color": $COLOR,
              "description": "rl-lang $TAG is out. Check the release page for the changelog and prebuilt binaries.",
              "fields": [
                { "name": "Release", "value": "[$TAG]($RELEASE_URL)", "inline": true }
              ]
            }]
          }
          EOF
          )

          curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
