name: Nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name_default: rl
            name_debug: rl_debug

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name_default: rl.exe
            name_debug: rl_debug.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build default
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy default binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/rl ${{ matrix.name_default }}

      - name: Copy default binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\rl.exe ${{ matrix.name_default }}
        shell: cmd

      - name: Build debug feature
        run: cargo build --release --features debug --target ${{ matrix.target }}

      - name: Copy debug binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp target/${{ matrix.target }}/release/rl ${{ matrix.name_debug }}

      - name: Copy debug binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\rl.exe ${{ matrix.name_debug }}
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.name_default }}
            ${{ matrix.name_debug }}

  publish:
    name: Publish Nightly
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Force-update nightly tag
        run: |
          git tag -f nightly
          git push origin nightly --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          generate_release_notes: false
          body: "Automated nightly build from the `dev` branch."
          files: artifacts/**/*