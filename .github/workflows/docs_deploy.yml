name: Deploy Docs

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Cargo Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Generate docs
        env:
          RUSTDOCFLAGS: "--default-theme ayu"
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --document-private-items

          CRATE_NAME=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(pkgs[0]['name'].replace('-','_'))")

          cat > target/doc/index.html << REDIRECT
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./${CRATE_NAME}/index.html">
          <link rel="canonical" href="./${CRATE_NAME}/index.html">
          REDIRECT

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4