[package]
name = "rl-lang"
version = "0.1.2"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "A simple interpreted programming language"
repository = "https://github.com/MohamedGonem/rl-lang"
readme = "README.md"
keywords = ["language", "interpreter", "cli"]
categories = ["command-line-utilities"]

[dependencies]
log = { version = "0.4", optional = true }
env_logger = { version = "0.11" , optional = true }
ariadne = "0.5"
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }
tower-lsp = { version = "0.20", optional = true }
tokio = { version = "1", features = ["full"] , optional = true }
serde_json = { version = "1", optional = true }
clap = { version = "4.6.1", features = ["derive"] }
toml = "0.8"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
criterion = "0.5"

[features]
default = ["repl", "repl_tui", "run", "eval"]
run = []
repl = []
repl_terminal = []
repl_tui = ["dep:ratatui","dep:crossterm"]
debug = ["dep:env_logger", "dep:log"]
eval = []
vm = []
cranelift = []
lsp = ["dep:tower-lsp", "dep:tokio", "dep:serde_json"]

[[bench]]
name = "test_benchmark"
harness = false
[[bench]]

name = "v0_1_0"
harness = false

[[bin]]
name = "rl"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

