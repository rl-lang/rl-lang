[package]
name = "rl-lang"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "A simple interpreted programming language"
repository = "https://github.com/MohamedGonem/rl-lang"
readme = "README.md"
keywords = ["language", "interpreter", "cli"]
categories = ["command-line-utilities"]

[dependencies]
log = { version = "0.4", features = ["release_max_level_off"] }
env_logger = "0.11"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "test_benchmark"
harness = false

[[bin]]
name = "rl"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

